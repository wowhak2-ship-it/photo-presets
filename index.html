<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Photo Presets</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0A0A0B">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Presets">
<meta name="mobile-web-app-capable" content="yes">

<style>
  :root{
    --bg:#0A0A0B; --panel:#17171B; --panel2:#202027; --line:rgba(255,255,255,.09);
    --text:#F4F4F5; --dim:#8A8A93;
    --gold:#F6C04E; --gold-dim:rgba(246,192,78,.16);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{background:var(--bg); color:var(--text);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; height:100vh; height:100dvh; overflow:hidden;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);}

  .glow{position:fixed; left:50%; bottom:-90px; transform:translateX(-50%);
    width:150%; height:280px; pointer-events:none; z-index:0; filter:blur(60px); opacity:.55;
    background:radial-gradient(50% 100% at 50% 100%, #FF6B2C 0%, #E23B2E 42%, rgba(226,59,46,0) 72%);}

  header{position:relative; z-index:2; display:flex; align-items:center; gap:8px; padding:14px 16px;}
  .title{position:absolute; left:0; right:0; text-align:center; font-size:12px; letter-spacing:.22em;
    color:var(--dim); font-weight:600; pointer-events:none;}
  .icon-btn{width:42px; height:42px; border-radius:12px; background:var(--panel); border:1px solid var(--line);
    color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .icon-btn svg{width:20px; height:20px;}
  .spacer{flex:1;}
  .pill{display:inline-flex; align-items:center; gap:7px; border-radius:22px; padding:10px 16px;
    font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--line); background:var(--panel); color:var(--text);}
  .pill svg{width:17px; height:17px;}
  .pill.gold{background:var(--gold); color:#1a1205; border-color:transparent;}
  .pill.ghost{background:transparent; color:var(--gold); border-color:rgba(246,192,78,.4);}
  .pill:active{transform:scale(.97);}

  main{position:relative; z-index:1; flex:1; min-height:0; display:flex; align-items:center; justify-content:center; padding:6px 16px; overflow:hidden;}
  #stageWrap{position:relative; display:inline-block; max-width:100%; max-height:100%; line-height:0; touch-action:none;}
  #stage{max-width:100%; max-height:100%; border-radius:16px; display:none;}
  #cmp{position:absolute; inset:0; display:none; pointer-events:none;}
  #cmp.on{display:block;}
  .cmp-lab{position:absolute; top:12px; font-size:11px; letter-spacing:.14em; font-weight:700;
    background:rgba(0,0,0,.55); color:#fff; padding:5px 10px; border-radius:20px;}
  .cmp-lab.b{left:12px;} .cmp-lab.a{right:12px;}
  #cmpDiv{position:absolute; top:0; bottom:0; width:2px; background:#fff; transform:translateX(-1px); box-shadow:0 0 8px rgba(0,0,0,.5);}
  #cmpHandle{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:40px; height:40px; border-radius:50%; background:#fff; color:#111; font-size:15px; font-weight:700;
    display:flex; align-items:center; justify-content:center; box-shadow:0 2px 10px rgba(0,0,0,.4);}

  #empty{display:flex; flex-direction:column; align-items:center; gap:12px; color:var(--dim); text-align:center;}
  #empty svg{width:46px; height:46px; opacity:.7;}

  .slider-row{position:relative; z-index:2; display:none; flex-direction:column; gap:6px; padding:10px 20px 2px;}
  .slider-head{display:flex; align-items:center; justify-content:space-between;}
  .slider-head .lbl{font-size:11px; letter-spacing:.16em; color:var(--dim); font-weight:600;}
  .slider-head .val{font-size:15px; font-weight:700; color:var(--gold); font-variant-numeric:tabular-nums;}
  .track-wrap{position:relative; height:34px; display:flex; align-items:center;}
  .ticks{position:absolute; inset:0 2px; pointer-events:none; opacity:.5;
    background:repeating-linear-gradient(90deg, var(--dim) 0 1px, transparent 1px 11px);
    -webkit-mask:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent); mask:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);}
  input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:34px; background:transparent; outline:none; position:relative; z-index:1;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:6px; height:34px; border-radius:3px; background:var(--gold); cursor:pointer; box-shadow:0 0 10px rgba(246,192,78,.6);}
  input[type=range]::-moz-range-thumb{width:6px; height:34px; border:none; border-radius:3px; background:var(--gold);}

  .toolbar{position:relative; z-index:2; display:none; align-items:center; justify-content:center; padding:2px 16px 6px;}
  .tool{display:inline-flex; align-items:center; gap:7px; background:transparent; border:none; color:var(--dim);
    font-size:12px; font-weight:600; letter-spacing:.06em; cursor:pointer; padding:6px 12px; border-radius:20px; user-select:none; -webkit-user-select:none;}
  .tool svg{width:16px; height:16px;}
  .tool.active{color:var(--gold); background:var(--gold-dim);}

  footer{position:relative; z-index:2; display:flex; gap:16px; padding:14px 16px calc(16px + env(safe-area-inset-bottom)); overflow-x:auto; scrollbar-width:none;}
  footer::-webkit-scrollbar{display:none;}
  .chip{display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; flex:0 0 auto;}
  .chip canvas{width:74px; height:74px; border-radius:14px; background:var(--panel); border:2px solid transparent; transition:border-color .15s;}
  .chip.active canvas{border-color:var(--gold); box-shadow:0 0 0 2px rgba(246,192,78,.25);}
  .chip span{font-size:11px; letter-spacing:.08em; font-weight:600; color:var(--dim); white-space:nowrap; text-transform:uppercase;}
  .chip.active span{color:var(--gold);}

  .cam{position:fixed; inset:0; z-index:50; background:#000; display:none; flex-direction:column;}
  .cam.open{display:flex;}
  .cam video{flex:1; width:100%; object-fit:cover; min-height:0; background:#000;}
  .cam-bar{display:flex; align-items:center; justify-content:space-between; padding:22px 34px; padding-bottom:calc(22px + env(safe-area-inset-bottom)); background:#000;}
  .cam-x{position:absolute; top:calc(16px + env(safe-area-inset-top)); left:16px; width:40px; height:40px; border-radius:50%; background:rgba(0,0,0,.5); border:none; color:#fff; font-size:20px; cursor:pointer; z-index:2;}
  .cam-flip{width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,.12); border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .cam-flip svg{width:22px;height:22px;}
  .shutter{width:74px; height:74px; border-radius:50%; background:#fff; border:5px solid rgba(246,192,78,.5); cursor:pointer; padding:0;}
  .shutter:active{transform:scale(.94);}
  .cam-err{color:#fff; text-align:center; padding:40px 24px; font-size:14px; line-height:1.5;}

  /* tabs: presets / adjustments */
  .tabs{position:relative; z-index:2; display:none; justify-content:center; gap:6px; padding:8px 16px 0;}
  .tab{background:transparent; border:none; color:var(--dim); font-size:12px; font-weight:700; letter-spacing:.12em;
    padding:8px 18px; border-radius:20px; cursor:pointer; text-transform:uppercase; position:relative;}
  .tab.active{color:var(--gold);}
  .tab.active::after{content:''; position:absolute; left:18px; right:18px; bottom:2px; height:2px; border-radius:2px; background:var(--gold);}
  .tab .dot{display:none; width:6px; height:6px; border-radius:50%; background:var(--gold); position:absolute; top:5px; right:9px;}
  .tab.has-adj .dot{display:block;}

  /* manual adjustments panel */
  .adjust-panel{position:relative; z-index:2; display:none; flex-direction:column; gap:3px;
    padding:8px 20px calc(10px + env(safe-area-inset-bottom));}
  .adj-row{display:flex; align-items:center; gap:12px; height:38px;}
  .adj-row .albl{flex:0 0 104px; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    font-size:11px; letter-spacing:.04em; color:var(--dim); font-weight:600; text-transform:uppercase;}
  .adj-row input[type=range]{flex:1; height:38px;}
  .adj-row .aval{flex:0 0 42px; text-align:right; font-size:14px; font-weight:700; color:var(--gold); font-variant-numeric:tabular-nums;}
  .adj-reset{align-self:center; margin-top:5px; background:transparent; border:1px solid var(--line); color:var(--dim);
    font-size:11px; font-weight:600; letter-spacing:.08em; padding:8px 18px; border-radius:20px; cursor:pointer; text-transform:uppercase;}
  .adj-reset:active{transform:scale(.97);}

  @media (max-width:520px){ .hide-sm{display:none;} }
</style>
</head>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>

<main>

</main>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="presets">Пресеты</button>
  <button class="tab" data-tab="adjust">Настройки<span class="dot"></span></button>
</div>

<div class="toolbar" id="toolbar">
  <button class="tool" id="compare">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18"/><path d="M6 8l-4 4 4 4"/><path d="M18 8l4 4-4 4"/></svg>
    ДО / ПОСЛЕ
  </button>
</div>

<div class="slider-row" id="sliderRow">
  <div class="slider-head"><span class="lbl">ИНТЕНСИВНОСТЬ</span><span class="val" id="intensityVal">100</span></div>
  <div class="track-wrap">
    <div class="ticks"></div>
    <input type="range" id="intensity" min="0" max="100" value="100">
  </div>
</div>

<footer id="chips"></footer>

<div class="adjust-panel" id="panelAdjust">
  <div class="adj-row"><span class="albl">Экспозиция</span><input type="range" id="adj-exposure" min="-100" max="100" value="0"><span class="aval" id="val-exposure">0</span></div>
  <div class="adj-row"><span class="albl">Контраст</span><input type="range" id="adj-contrast" min="-100" max="100" value="0"><span class="aval" id="val-contrast">0</span></div>
  <div class="adj-row"><span class="albl">Тепло</span><input type="range" id="adj-temp" min="-100" max="100" value="0"><span class="aval" id="val-temp">0</span></div>
  <div class="adj-row"><span class="albl">Насыщенность</span><input type="range" id="adj-saturation" min="-100" max="100" value="0"><span class="aval" id="val-saturation">0</span></div>
  <div class="adj-row"><span class="albl">Зерно</span><input type="range" id="adj-grain" min="0" max="100" value="0"><span class="aval" id="val-grain">0</span></div>
  <button class="adj-reset" id="adjReset">Сбросить</button>
</div>

<div class="cam" id="cam">
  <button class="cam-x" id="camX">✕</button>
  <video id="camVideo" playsinline autoplay muted></video>
  <div class="cam-bar">
    <div style="width:48px"></div>
    <button class="shutter" id="shutter" aria-label="Снять"></button>
    <button class="cam-flip" id="camFlip" aria-label="Сменить камеру">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.8-3.4L23 10M1 14l4.7 4.4A9 9 0 0 0 20.5 15"/></svg>
    </button>
  </div>
</div>

<input type="file" id="file" accept="image/*" hidden>

<script>
// ─── Look engine (tone curve + split toning + vibrance + matte + grain + vignette) ───
const LUM = [0.213, 0.715, 0.072];
const clamp = v => v < 0 ? 0 : v > 255 ? 255 : v;
const clamp01 = v => v < 0 ? 0 : v > 1 ? 1 : v;

function buildToneLUT(o){
  const lut = new Uint8ClampedArray(256);
  for(let i=0;i<256;i++){
    let n = i/255;
    n = (n - 0.5) * (1 + o.contrast) + 0.5;
    n = o.fade + (1 - o.fade) * n;
    if(o.shadowsLift) n = Math.pow(clamp01(n), 1 - o.shadowsLift*0.6);
    if(o.highlightsRoll) n = n - o.highlightsRoll * n * n * 0.18;
    lut[i] = clamp(n*255);
  }
  return lut;
}
function applyLook(img, look){
  const d = img.data, W = img.width, H = img.height;
  const lut = look._lut || (look._lut = buildToneLUT(look));
  const temp = look.temp||0, tint = look.tint||0;
  const sh = look.shSplit||[0,0,0], hi = look.hiSplit||[0,0,0];
  const sat = look.saturation==null?1:look.saturation, vib = look.vibrance||0;
  const cx = W/2, cy = H/2, maxD = Math.hypot(cx,cy), vig = look.vignette||0, grain = look.grain||0;
  for(let p=0, px=0; p<d.length; p+=4, px++){
    let R = d[p], G = d[p+1], B = d[p+2];
    R += temp;  B -= temp;  G += tint;
    R = lut[clamp(R)|0]; G = lut[clamp(G)|0]; B = lut[clamp(B)|0];
    const L = (LUM[0]*R + LUM[1]*G + LUM[2]*B) / 255, sw = 1 - L, hw = L;
    R += sh[0]*sw + hi[0]*hw;  G += sh[1]*sw + hi[1]*hw;  B += sh[2]*sw + hi[2]*hw;
    const avg = (R + G + B) / 3, cur = Math.max(R,G,B) - Math.min(R,G,B);
    const s = sat + vib * (1 - clamp01(cur/160));
    R = avg + (R-avg)*s;  G = avg + (G-avg)*s;  B = avg + (B-avg)*s;
    if(vig){ const x = px % W, y = (px / W)|0; const dd = Math.hypot(x-cx, y-cy)/maxD; const f = 1 - vig*dd*dd; R*=f; G*=f; B*=f; }
    if(grain){ const g = (Math.random()-0.5) * grain * 90; R+=g; G+=g; B+=g; }
    d[p]=clamp(R); d[p+1]=clamp(G); d[p+2]=clamp(B);
  }
  return img;
}
function applyBloom(canvas, amount, warm){
  if(!amount || amount <= 0) return;
  const w = canvas.width, h = canvas.height;
  const tmp = document.createElement('canvas'); tmp.width = w; tmp.height = h;
  const tc = tmp.getContext('2d');
  tc.filter = 'blur(' + Math.max(2, Math.round(Math.max(w,h)*0.022)) + 'px) brightness(1.20) saturate(1.05)';
  tc.drawImage(canvas, 0, 0);
  if(warm){
    // tint the glow golden so backlight haze reads warm (like a Lightroom golden-hour edit), not white
    tc.filter = 'none';
    tc.globalCompositeOperation = 'multiply';
    tc.fillStyle = 'rgb(255,206,138)';
    tc.fillRect(0, 0, w, h);
    tc.globalCompositeOperation = 'source-over';
  }
  const ctx = canvas.getContext('2d');
  ctx.save(); ctx.globalCompositeOperation = 'screen'; ctx.globalAlpha = Math.min(0.72, amount);
  ctx.drawImage(tmp, 0, 0); ctx.restore();
}

// Manual adjustments layered on top of the preset (all 0 = no-op). Ranges: exposure/contrast/temp/saturation -100..100, grain 0..100
function applyAdjust(img, a){
  if(!(a.exposure||a.contrast||a.temp||a.saturation||a.grain)) return img;
  const d = img.data;
  const ex = 1 + a.exposure/100*0.5;   // 0.5..1.5 brightness multiplier
  const c  = a.contrast/100*0.6;       // -0.6..0.6 around mid grey
  const tp = a.temp/100*28;            // -28..28 warm/cool
  const sat = 1 + a.saturation/100;    // 0..2
  const gr = a.grain/100*80;           // 0..80 noise amplitude
  for(let p=0; p<d.length; p+=4){
    let R = d[p]*ex, G = d[p+1]*ex, B = d[p+2]*ex;
    R += tp; B -= tp;
    if(c){ R=(R-128)*(1+c)+128; G=(G-128)*(1+c)+128; B=(B-128)*(1+c)+128; }
    if(sat!==1){ const avg=(R+G+B)/3; R=avg+(R-avg)*sat; G=avg+(G-avg)*sat; B=avg+(B-avg)*sat; }
    if(gr){ const g=(Math.random()-0.5)*gr; R+=g; G+=g; B+=g; }
    d[p]=clamp(R); d[p+1]=clamp(G); d[p+2]=clamp(B);
  }
  return img;
}

const LOOKS = [
  { name:"Золотой час", temp:12, tint:1, contrast:0.10, fade:0.08, shadowsLift:0.24, highlightsRoll:0.14,
    shSplit:[8,4,-2], hiSplit:[18,10,-6], vibrance:0.14, saturation:1.04, vignette:0.06, grain:0.03, bloom:0.50, bloomWarm:true },
  { name:"Плёнка",   temp:10, tint:2,  contrast:0.12, fade:0.06, shadowsLift:0.18, highlightsRoll:0.15,
    shSplit:[-4,2,6],   hiSplit:[10,4,-6],  vibrance:0.22, saturation:1.02, vignette:0.05, grain:0.05 },
  { name:"Кино",     temp:4,  tint:0,  contrast:0.22, fade:0.05, shadowsLift:0.05, highlightsRoll:0.10,
    shSplit:[-18,4,20], hiSplit:[22,6,-16], vibrance:0.10, saturation:1.05, vignette:0.28, grain:0.04 },
  { name:"Винтаж",   temp:12, tint:4,  contrast:0.05, fade:0.20, shadowsLift:0.22, highlightsRoll:0.22,
    shSplit:[8,4,-4],   hiSplit:[14,6,-10], vibrance:0.0,  saturation:0.8,  vignette:0.22, grain:0.09 },
  { name:"Портрет",  temp:6,  tint:-2, contrast:0.08, fade:0.03, shadowsLift:0.14, highlightsRoll:0.20,
    shSplit:[2,0,2],    hiSplit:[8,4,-2],   vibrance:0.16, saturation:1.0,  vignette:0.06, grain:0.03 },
  { name:"Муди",     temp:-4, tint:2,  contrast:0.20, fade:0.08, shadowsLift:-0.06, highlightsRoll:0.20,
    shSplit:[-10,2,10], hiSplit:[6,2,-6],   vibrance:0.05, saturation:0.82, vignette:0.32, grain:0.05 },
  { name:"Ч/Б",      temp:0,  tint:0,  contrast:0.26, fade:0.04, shadowsLift:0.06, highlightsRoll:0.08,
    shSplit:[0,0,0],    hiSplit:[0,0,0],    vibrance:0.0,  saturation:0.0,  vignette:0.20, grain:0.11 },
  // ── new looks (added 12.07) ──
  { name:"Блокбастер", temp:6, tint:0,  contrast:0.20, fade:0.03, shadowsLift:0.08, highlightsRoll:0.14,
    shSplit:[-20,3,16], hiSplit:[20,5,-14], vibrance:0.12, saturation:1.06, vignette:0.16, grain:0.03 },
  { name:"Пастель",  temp:4,  tint:-2, contrast:-0.06, fade:0.16, shadowsLift:0.22, highlightsRoll:0.10,
    shSplit:[4,2,6],    hiSplit:[10,4,2],   vibrance:0.04, saturation:0.86, vignette:0.0,  grain:0.02, bloom:0.16 },
  { name:"Kodak",    temp:8,  tint:-2, contrast:0.10, fade:0.08, shadowsLift:0.16, highlightsRoll:0.18,
    shSplit:[2,0,4],    hiSplit:[12,6,-4],  vibrance:0.14, saturation:0.98, vignette:0.06, grain:0.06 },
  { name:"Матовый Ч/Б", temp:0, tint:0, contrast:0.05, fade:0.18, shadowsLift:0.12, highlightsRoll:0.12,
    shSplit:[0,0,0],    hiSplit:[0,0,0],    vibrance:0.0,  saturation:0.0,  vignette:0.14, grain:0.10 },
];

let selected = 0, intensity = 100, sourceCanvas = null, compareMode = false, comparePos = 0.5, editedCanvas = null;
const ADJ_KEYS = ['exposure','contrast','temp','saturation','grain'];
let adjust = { exposure:0, contrast:0, temp:0, saturation:0, grain:0 };
const stage = document.getElementById('stage');
const sctx = stage.getContext('2d', { willReadFrequently:true });

function setSource(img){
  const max = 1400; let w = img.width, h = img.height;
  const scale = Math.min(1, max/Math.max(w,h));
  w = Math.round(w*scale); h = Math.round(h*scale);
  sourceCanvas = document.createElement('canvas');
  sourceCanvas.width = w; sourceCanvas.height = h;
  sourceCanvas.getContext('2d').drawImage(img, 0, 0, w, h);
  stage.width = w; stage.height = h;
  document.getElementById('empty').style.display = 'none';
  stage.style.display = 'block';
  document.getElementById('save').style.display = 'inline-flex';
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('tabs').style.display = 'flex';
  setTab('presets');
  buildChips(); render();
}

function processedData(){
  const w = sourceCanvas.width, h = sourceCanvas.height;
  const orig = sourceCanvas.getContext('2d').getImageData(0,0,w,h);
  const proc = new ImageData(new Uint8ClampedArray(orig.data), w, h);
  applyLook(proc, LOOKS[selected]);
  const t = intensity/100, od = orig.data, pd = proc.data;
  for(let i=0;i<pd.length;i+=4){
    pd[i]=od[i]*(1-t)+pd[i]*t; pd[i+1]=od[i+1]*(1-t)+pd[i+1]*t; pd[i+2]=od[i+2]*(1-t)+pd[i+2]*t;
  }
  applyAdjust(proc, adjust);   // manual doctoring on top of the preset
  return proc;
}
// Cache the processed image so the compare slider never recomputes the filter while dragging
function buildEdited(){
  const w = sourceCanvas.width, h = sourceCanvas.height;
  if(!editedCanvas) editedCanvas = document.createElement('canvas');
  editedCanvas.width = w; editedCanvas.height = h;
  editedCanvas.getContext('2d').putImageData(processedData(), 0, 0);
  const bl = LOOKS[selected].bloom;
  if(bl) applyBloom(editedCanvas, bl * (intensity/100), LOOKS[selected].bloomWarm);
}
// Lightweight compositing of original (left) + cached edited (right) — runs on every drag frame
function drawCompare(){
  const w = stage.width, h = stage.height;
  const splitX = Math.round(clamp01(comparePos) * w);
  sctx.drawImage(sourceCanvas, 0, 0);
  if(splitX < w && editedCanvas){
    sctx.save();
    sctx.beginPath(); sctx.rect(splitX, 0, w - splitX, h); sctx.clip();
    sctx.drawImage(editedCanvas, 0, 0);
    sctx.restore();
  }
  document.getElementById('cmpDiv').style.left = (comparePos*100)+'%';
}

// Size the canvas via CSS to CONTAIN it in main's box (max-height:100% can't resolve
// through the auto-height wrapper, so portrait photos overflowed onto the panel — fix it in JS)
function fitStage(){
  if(!sourceCanvas) return;
  const main = document.querySelector('main'), cs = getComputedStyle(main);
  const availW = main.clientWidth  - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
  const availH = main.clientHeight - parseFloat(cs.paddingTop)  - parseFloat(cs.paddingBottom);
  if(availW <= 0 || availH <= 0) return;
  const ar = stage.width / stage.height;
  let w = availW, h = w/ar;
  if(h > availH){ h = availH; w = h*ar; }
  stage.style.width = Math.floor(w)+'px';
  stage.style.height = Math.floor(h)+'px';
}

let raf = 0;
function render(){ if(!sourceCanvas) return; cancelAnimationFrame(raf); raf = requestAnimationFrame(renderNow); }
function renderNow(){
  if(compareMode){ buildEdited(); drawCompare(); return; }
  sctx.putImageData(processedData(), 0, 0);
  const bl = LOOKS[selected].bloom;
  if(bl) applyBloom(stage, bl * (intensity/100), LOOKS[selected].bloomWarm);
}

function buildChips(){
  const chips = document.getElementById('chips'); chips.innerHTML = '';
  const ts = 74, ar = sourceCanvas.width/sourceCanvas.height;
  const t = document.createElement('canvas'); t.width = ts; t.height = ts;
  const tctx = t.getContext('2d');
  let sw=sourceCanvas.width, sh=sourceCanvas.height, sx=0, sy=0;
  if(ar>1){ sw=sh; sx=(sourceCanvas.width-sw)/2; } else { sh=sw; sy=(sourceCanvas.height-sh)/2; }
  tctx.drawImage(sourceCanvas, sx, sy, sw, sh, 0, 0, ts, ts);
  const thumb = tctx.getImageData(0,0,ts,ts);
  LOOKS.forEach((look, i)=>{
    const chip = document.createElement('div');
    chip.className = 'chip' + (i===selected?' active':'');
    const c = document.createElement('canvas'); c.width=ts; c.height=ts;
    const id = new ImageData(new Uint8ClampedArray(thumb.data), ts, ts);
    applyLook(id, look);
    c.getContext('2d').putImageData(id, 0, 0);
    const label = document.createElement('span'); label.textContent = look.name;
    chip.appendChild(c); chip.appendChild(label);
    chip.onclick = ()=>{
      selected = i; intensity = 100;
      document.getElementById('intensity').value = 100;
      document.getElementById('intensityVal').textContent = '100';
      [...chips.children].forEach((el,idx)=> el.classList.toggle('active', idx===i));
      render();
    };
    chips.appendChild(chip);
  });
}

document.getElementById('pick').onclick = ()=> document.getElementById('file').click();
document.getElementById('file').onchange = e=>{
  const f = e.target.files[0]; if(!f) return;
  const img = new Image(); img.onload = ()=> setSource(img); img.src = URL.createObjectURL(f);
};
document.getElementById('intensity').oninput = e=>{
  intensity = +e.target.value;
  document.getElementById('intensityVal').textContent = intensity;
  render();
};

// ─── Tabs (presets / adjust) + manual adjustment sliders ───
function setTab(name){
  document.querySelectorAll('.tab').forEach(t=> t.classList.toggle('active', t.dataset.tab===name));
  const pres = name==='presets';
  document.getElementById('sliderRow').style.display = pres?'flex':'none';
  document.getElementById('chips').style.display = pres?'flex':'none';
  document.getElementById('panelAdjust').style.display = pres?'none':'flex';
  fitStage();   // panel height differs per tab → re-fit the photo
  if(compareMode) drawCompare();
}
document.querySelectorAll('.tab').forEach(t=> t.onclick = ()=> setTab(t.dataset.tab));

function updateAdjDot(){
  const on = ADJ_KEYS.some(k=> adjust[k]!==0);
  document.querySelector('.tab[data-tab="adjust"]').classList.toggle('has-adj', on);
}
ADJ_KEYS.forEach(k=>{
  const el = document.getElementById('adj-'+k), out = document.getElementById('val-'+k);
  el.oninput = ()=>{
    adjust[k] = +el.value;
    out.textContent = (k!=='grain' && adjust[k]>0 ? '+' : '') + adjust[k];
    updateAdjDot(); render();
  };
});
document.getElementById('adjReset').onclick = ()=>{
  ADJ_KEYS.forEach(k=>{ adjust[k]=0;
    document.getElementById('adj-'+k).value = 0;
    document.getElementById('val-'+k).textContent = '0'; });
  updateAdjDot(); render();
};
document.getElementById('save').onclick = ()=>{
  const w = sourceCanvas.width, h = sourceCanvas.height;
  const out = document.createElement('canvas'); out.width=w; out.height=h;
  out.getContext('2d').putImageData(processedData(), 0, 0);
  const bl = LOOKS[selected].bloom; if(bl) applyBloom(out, bl * (intensity/100), LOOKS[selected].bloomWarm);
  out.toBlob(b=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(b);
    a.download='edit_'+Date.now()+'.jpg'; a.click(); }, 'image/jpeg', 0.95);
};

// ─── Before / after: toggle + smooth drag (composites cached layers, throttled to animation frames) ───
const compareBtn = document.getElementById('compare');
const cmpOverlay = document.getElementById('cmp'), stageWrap = document.getElementById('stageWrap');
compareBtn.onclick = ()=>{
  compareMode = !compareMode;
  compareBtn.classList.toggle('active', compareMode);
  cmpOverlay.classList.toggle('on', compareMode);
  render();
};
let dragging = false, dragRaf = 0, pendingPos = 0.5;
function queueDraw(e){
  const r = stage.getBoundingClientRect();
  pendingPos = clamp01((e.clientX - r.left) / r.width);
  if(dragRaf) return;
  dragRaf = requestAnimationFrame(()=>{ dragRaf = 0; comparePos = pendingPos; drawCompare(); });
}
stageWrap.addEventListener('pointerdown', e=>{
  if(!compareMode) return;
  e.preventDefault(); dragging = true;
  try { stageWrap.setPointerCapture(e.pointerId); } catch(_){}
  queueDraw(e);
});
stageWrap.addEventListener('pointermove', e=>{ if(compareMode && dragging){ e.preventDefault(); queueDraw(e); } });
stageWrap.addEventListener('pointerup', ()=>{ dragging = false; });
stageWrap.addEventListener('pointercancel', ()=>{ dragging = false; });

function makeDemoPhoto(){
  const c = document.createElement('canvas'); c.width=900; c.height=600; const x=c.getContext('2d');
  let g = x.createLinearGradient(0,0,0,600);
  g.addColorStop(0,'#2a5a8c'); g.addColorStop(.45,'#8fb8d8'); g.addColorStop(.55,'#f0c987'); g.addColorStop(1,'#c9722f');
  x.fillStyle=g; x.fillRect(0,0,900,600);
  x.fillStyle='#ffe6b0'; x.beginPath(); x.arc(680,300,70,0,7); x.fill();
  let g2 = x.createLinearGradient(0,430,0,600); g2.addColorStop(0,'#3f7d3a'); g2.addColorStop(1,'#1e3d1c');
  x.fillStyle=g2; x.fillRect(0,430,900,170);
  x.fillStyle='#e0a878'; x.fillRect(60,90,150,150);
  x.fillStyle='#c98a5e'; x.fillRect(60,240,150,40);
  ['#eee','#bbb','#888','#555','#222'].forEach((col,i)=>{ x.fillStyle=col; x.fillRect(720,60+i*26,120,24); });
  const img = new Image(); img.onload = ()=> setSource(img); img.src = c.toDataURL();
}
// start on the real demo photo; fall back to the synthetic gradient if it can't load
function loadDemo(){
  const img = new Image();
  img.onload = ()=> setSource(img);
  img.onerror = ()=> makeDemoPhoto();
  img.src = './demo.jpg';
}
loadDemo();

// re-fit the photo on rotate / viewport change
window.addEventListener('resize', ()=>{ fitStage(); if(compareMode) drawCompare(); });

// ─── Camera ───
let camStream = null, facing = 'environment';
const cam = document.getElementById('cam'), camVideo = document.getElementById('camVideo');
async function startStream(){
  if(camStream) camStream.getTracks().forEach(t=>t.stop());
  camStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:facing, width:{ideal:1920}, height:{ideal:1080} }, audio:false });
  camVideo.srcObject = camStream;
}
async function openCamera(){
  cam.classList.add('open');
  try { await startStream(); }
  catch(e){
    cam.innerHTML = '<button class="cam-x" id="camX2">✕</button><div class="cam-err">Не удалось открыть камеру.<br>' + (e.message||e.name) +
      '<br><br>Разрешите доступ к камере, либо возьмите фото через «Галерею».</div>';
    document.getElementById('camX2').onclick = closeCamera;
  }
}
function closeCamera(){ if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; } cam.classList.remove('open'); }
function shoot(){
  if(!camVideo.videoWidth) return;
  const c = document.createElement('canvas'); c.width = camVideo.videoWidth; c.height = camVideo.videoHeight;
  c.getContext('2d').drawImage(camVideo, 0, 0);
  const img = new Image(); img.onload = ()=>{ closeCamera(); setSource(img); }; img.src = c.toDataURL('image/jpeg', 0.95);
}
async function flipCamera(){ facing = facing==='environment' ? 'user' : 'environment'; try { await startStream(); } catch(e){} }
document.getElementById('camBtn').onclick = openCamera;
document.getElementById('camX').onclick = closeCamera;
document.getElementById('shutter').onclick = shoot;
document.getElementById('camFlip').onclick = flipCamera;

// ─── PWA ───
if('serviceWorker' in navigator){ window.addEventListener('load', ()=> navigator.serviceWorker.register('./sw.js').catch(()=>{})); }
let deferredPrompt = null;
const installBtn = document.getElementById('install');
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'inline-flex'; });
installBtn.onclick = async ()=>{ if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; installBtn.style.display='none'; };
window.addEventListener('appinstalled', ()=> { installBtn.style.display = 'none'; });
</script>
